# 
# SCEXAO.yml -- SCEXAO launchers file 
#
# This is a YAML file

tabname: "SCEXAO Setup"
launchers:

  -
    label: "Superk"
    cmd: EXEC SCEXAO SUPERK POWER=$VAL01
    params:
      - [ VAL01, LIST, [ "ON", "OFF" ], "POWER" ]

  -
    label: "Source Flux"
    cmd: EXEC SCEXAO SRC_FLUX CONFIG=$VAL01
    params:
      - [ VAL01, LIST, [ "DEFAULT","CHARIS" ], "CONFIG" ]

  - sep
